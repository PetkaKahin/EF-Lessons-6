name: ${COMPOSE_PROJECT_NAME:-ef_lesson_6}

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: '${UID:-1000}'
        GID: '${GID:-1000}'
    image: ${COMPOSE_PROJECT_NAME:-ef_lesson_6}_php
    container_name: ef_lesson_6_php
    working_dir: /var/www/html
    user: '${UID:-1000}:${GID:-1000}'
    env_file:
      - path: .env
        required: false
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-laravel.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel

  web:
    image: nginx:stable-alpine
    container_name: ef_lesson_6_web
    ports:
      - '${APP_PORT:-8080}:80'
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - laravel

  queue:
    image: ${COMPOSE_PROJECT_NAME:-ef_lesson_6}_php
    container_name: ef_lesson_6_queue
    working_dir: /var/www/html
    user: '${UID:-1000}:${GID:-1000}'
    env_file:
      - path: .env
        required: false
    command: sh -lc "until [ -f vendor/autoload.php ]; do sleep 2; done; php artisan queue:work --sleep=3 --tries=3"
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-laravel.ini:ro
    depends_on:
      php:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel

  postgres:
    image: postgres:17-alpine
    container_name: ef_lesson_6_postgres
    environment:
      POSTGRES_DB: '${DB_DATABASE:-laravel}'
      POSTGRES_USER: '${DB_USERNAME:-laravel}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
    ports:
      - '${DB_PORT_FORWARD:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - laravel

  redis:
    image: redis:8-alpine
    container_name: ef_lesson_6_redis
    command: redis-server --appendonly yes
    ports:
      - '${REDIS_PORT_FORWARD:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - laravel

volumes:
  postgres_data:
  redis_data:

networks:
  laravel:
    driver: bridge
